spring.application.name=cloud-file-storage

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

## ============================================
## datasource setup (PostgreSQL)
## ============================================
#spring.datasource.driver-class-name=org.postgresql.Driver
#spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:5432}
#spring.datasource.username=${DB_USER:username}
#spring.datasource.name=${DB_NAME:postgres}
#spring.datasource.password=${DB_PASSWORD:123456}

# ============================================
# sessions setup (Redis)
# ============================================
spring.session.store-type=redis
spring.session.timeout=24h
spring.session.data.redis.namespace=spring:session
spring.session.data.redis.flush-mode=on-save

# ============================================
# setup REDIS
# ============================================
#spring.data.redis.host=${REDIS_HOST:localhost}
#spring.data.redis.port=${REDIS_PORT:6379}
#spring.data.redis.timeout=2000ms

# connection pool Lettuce
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# ============================================
# logging settings
# ============================================
logging.level.root=INFO
logging.level.com.example.cloud_storage=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.session=DEBUG
logging.level.org.springframework.data.redis=DEBUG

# ============================================
# server and cookie setup
# ============================================
server.servlet.session.cookie.secure=false

