spring.application.name=cloud-file-storage

# ============================================
# ????????? DATASOURCE (PostgreSQL)
# ============================================
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/${spring.datasource.name}}
spring.datasource.username=dev
spring.datasource.name=postgres
spring.datasource.password=13579

# ============================================
# ????????? ?????? (Redis)
# ============================================
spring.session.store-type=redis
spring.session.timeout=24h
spring.session.data.redis.namespace=spring:session
spring.session.data.redis.flush-mode=on-save

# ============================================
# ????????? REDIS
# ============================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

# ??? ?????????? Lettuce
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# ============================================
# ????????? ???????????
# ============================================
logging.level.root=INFO
logging.level.com.example.cloud_storage=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.session=DEBUG
logging.level.org.springframework.data.redis=DEBUG

# ============================================
# ????????? ??????? ? ????
# ============================================
server.servlet.session.cookie.secure=false