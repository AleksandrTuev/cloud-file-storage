services:
  postgres:
    image: postgres:16.1-alpine
    environment:
      - 'POSTGRES_DB=postgres'
      - 'POSTGRES_PASSWORD=13579'
      - 'POSTGRES_USER=dev'
    ports:
      - '5432:5432'
  redis:
    image: redis:8.6.4-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes
  minio:
    image: minio/minio:latest
    container_name: minio-server
    ports:
      - "9000:9000"  # Порт для API (используется в MinioConfig на Java)
      - "9001:9001"  # Порт для Web-интерфейса (для браузера)
    environment:
      MINIO_ROOT_USER: minioadmin      # Логин (Access Key)
      MINIO_ROOT_PASSWORD: minioadmin  # Пароль (Secret Key, минимум 8 символов)
    volumes:
      - minio_data:/data               # Постоянное хранилище для ваших файлов
    # Команда запуска указывает MinIO обслуживать папку /data и принудительно задает порт консоли
    command: server /data --console-address ":9001"
    restart: always
volumes:
  redis_data:
  minio_data:                          # Именованный том, чтобы файлы не стирались при перезапуске